<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      .placeholder-bg { fill: #e5e7eb; }
      .placeholder-icon { fill: #9ca3af; }
      .placeholder-text { font-family: Arial, sans-serif; font-size: 24px; fill: #6b7280; text-anchor: middle; }
    </style>
  </defs>
  
  <rect class="placeholder-bg" width="500" height="350"/>
  
  <g class="placeholder-icon">
    <rect x="175" y="100" width="150" height="120" fill="none" stroke="#9ca3af" stroke-width="3"/>
    <circle cx="212.5" cy="135" r="15" fill="none" stroke="#9ca3af" stroke-width="3"/>
    <polygon points="250,200 175,140 225,100 275,140" fill="none" stroke="#9ca3af" stroke-width="3" stroke-linejoin="round"/>
  </g>
  
  <text class="placeholder-text" x="250" y="270">No Image Available</text>
